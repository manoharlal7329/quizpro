<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Library — QuizPro Arena</title>
    <link rel="manifest" href="/manifest.json?v=1.3" />
    <link rel="stylesheet" href="/css/style.css?v=1.3" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold-lux: #c9a84c;
            --gold-pale: #f0d080;
            --card-lux: rgba(12, 10, 20, 0.78);
            --border-lux: rgba(201, 168, 76, 0.2);
            --border-subtle: rgba(255, 255, 255, 0.07);
            --glow-gold: 0 0 40px rgba(201, 168, 76, 0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        /* ── HERO ────────────────────────────────────────────────────────────── */
        .library-hero {
            position: relative;
            text-align: center;
            padding: 56px 24px 36px;
            overflow: hidden;
        }

        .library-hero::before {
            content: '';
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: 420px;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-tag {
            display: inline-block;
            font-size: .65rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-lux);
            border: 1px solid rgba(201, 168, 76, 0.3);
            padding: 5px 14px;
            border-radius: 99px;
            margin-bottom: 18px;
            background: rgba(201, 168, 76, 0.05);
        }

        .hero-title {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #c9a84c 0%, #f0d080 40%, #c9a84c 75%, #e6c05a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .hero-sub {
            font-size: .9rem;
            color: rgba(255, 255, 255, 0.38);
            letter-spacing: 1px;
            max-width: 480px;
            margin: 0 auto 28px;
            line-height: 1.6;
        }

        /* ── SEARCH BAR ──────────────────────────────────────────────────────── */
        .search-wrap {
            max-width: 440px;
            margin: 0 auto 36px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 12px 18px 12px 44px;
            border-radius: 12px;
            border: 1px solid var(--border-lux);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: .88rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .2s;
            box-sizing: border-box;
        }

        .search-wrap input:focus {
            border-color: var(--gold-lux);
        }

        .search-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: .5;
        }

        /* ── FILTER TABS ──────────────────────────────────────────────────────── */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 32px;
        }

        .filter-btn {
            padding: 7px 18px;
            border-radius: 99px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: .3px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--gold-lux);
            color: var(--gold-lux);
            background: rgba(201, 168, 76, 0.07);
        }

        /* ── BOOKS GRID ───────────────────────────────────────────────────────── */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        /* ── BOOK CARD ────────────────────────────────────────────────────────── */
        .book-card {
            background: var(--card-lux);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-lux);
            box-shadow: var(--glow-gold);
        }

        /* Cover Strip */
        .book-cover {
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .book-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(12, 10, 20, 0.85) 100%);
        }

        .book-cover-emoji {
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.4));
            position: relative;
            z-index: 1;
        }

        .book-subject-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: .6rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 3px 9px;
            border-radius: 99px;
            z-index: 2;
        }

        /* Offer badge */
        .offer-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            font-size: .62rem;
            font-weight: 800;
            letter-spacing: .5px;
            padding: 4px 10px;
            border-radius: 99px;
            z-index: 2;
        }

        /* Card Body */
        .book-body {
            padding: 18px 18px 20px;
        }

        .book-title {
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
            line-height: 1.35;
        }

        .book-desc {
            font-size: .75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 14px;
            line-height: 1.5;
        }

        /* Stats row */
        .book-stats {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }

        .book-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: .72rem;
            color: rgba(255, 255, 255, 0.38);
        }

        .book-stat span:first-child {
            font-size: .85rem;
        }

        /* Price area */
        .book-price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price-offer {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--gold-lux);
        }

        .price-original {
            font-size: .78rem;
            color: rgba(255, 255, 255, 0.28);
            text-decoration: line-through;
            margin-left: 6px;
        }

        .price-free {
            font-size: 1.2rem;
            font-weight: 900;
            color: #34d399;
        }

        /* Unlock/Access button */
        .book-btn {
            padding: 9px 18px;
            border-radius: 10px;
            font-size: .8rem;
            font-weight: 700;
            border: 1px solid rgba(201, 168, 76, 0.3);
            background: rgba(201, 168, 76, 0.08);
            color: var(--gold-lux);
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .book-btn:hover {
            background: rgba(201, 168, 76, 0.18);
            border-color: var(--gold-lux);
        }

        .book-btn.unlocked {
            border-color: rgba(52, 211, 153, 0.3);
            background: rgba(52, 211, 153, 0.07);
            color: #34d399;
        }

        .book-btn.unlocked:hover {
            background: rgba(52, 211, 153, 0.14);
        }

        /* ── MODAL ───────────────────────────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: rgba(14, 12, 26, 0.95);
            border: 1px solid var(--border-lux);
            border-radius: 24px;
            padding: 32px;
            max-width: 440px;
            width: 100%;
            position: relative;
            animation: slideUp .25s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(24px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: .9rem;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
        }

        .modal-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Quiz mode card */
        .quiz-mode-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all .2s;
        }

        .quiz-mode-card:hover,
        .quiz-mode-card.selected {
            border-color: var(--gold-lux);
            background: rgba(201, 168, 76, 0.06);
        }

        .quiz-mode-label {
            font-size: .88rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 3px;
        }

        .quiz-mode-sub {
            font-size: .72rem;
            color: rgba(255, 255, 255, 0.35);
        }

        /* ── EMPTY ───────────────────────────────────────────────────────────── */
        .books-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.25);
            grid-column: 1 / -1;
        }

        .books-empty .ei {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        @media (max-width: 600px) {
            .hero-title {
                font-size: 2rem;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar deep-glass">
        <a href="/" class="logo" style="font-size:1.3rem;">💎 QuizPro Arena</a>
        <div class="nav-links">
            <a href="/wallet.html" id="quickWallet"
                style="padding:6px 14px;border-radius:20px;display:flex;align-items:center;gap:8px;text-decoration:none;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.05);">
                <span>💰</span>
                <span id="navBal" style="font-size:.9rem;font-weight:800;color:var(--green);">₹0</span>
            </a>
            <a href="/dashboard.html" style="color:var(--muted);font-size:.88rem;">Dashboard</a>
            <a href="/books.html" style="color:var(--gold-lux);font-size:.88rem;font-weight:700;">📖 Library</a>
            <button class="btn btn-outline" style="padding:6px 16px;font-size:.85rem;border-radius:12px;"
                onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- MOBILE BOTTOM NAV -->
    <div class="bottom-nav">
        <a href="/dashboard.html" class="nav-item">
            <i style="font-style:normal;font-size:1.6rem;">🏠</i>
            <span>Home</span>
            <div class="icon-dot"></div>
        </a>
        <a href="/books.html" class="nav-item active">
            <i style="font-style:normal;font-size:1.6rem;">📖</i>
            <span>Library</span>
            <div class="icon-dot"></div>
        </a>
        <a href="/wallet.html" class="nav-item">
            <i style="font-style:normal;font-size:1.6rem;">👤</i>
            <span>Account</span>
            <div class="icon-dot"></div>
        </a>
        <a href="/leaderboard.html" class="nav-item">
            <i style="font-style:normal;font-size:1.6rem;">🏆</i>
            <span>Ranks</span>
            <div class="icon-dot"></div>
        </a>
    </div>

    <div class="main">
        <div class="container">

            <!-- HERO -->
            <div class="library-hero">
                <div class="hero-tag">✦ Exclusive Content Library ✦</div>
                <div class="hero-title">Elite Book Library</div>
                <div class="hero-sub">Premium question banks curated by experts. Select a book, practice, and dominate
                    the quiz arena.</div>
            </div>

            <!-- SEARCH -->
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by title or subject..." oninput="filterBooks()">
            </div>

            <!-- SUBJECT FILTERS -->
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-subject="all" onclick="setFilter('all', this)">All Books</button>
            </div>

            <!-- GRID -->
            <div class="books-grid" id="booksGrid">
                <div class="books-empty">
                    <div class="ei">📚</div>
                    <p>Loading library...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- BOOK DETAIL / QUIZ MODAL -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="/js/common.js?v=1.3"></script>
    <script>
        requireLogin();
        let allBooks = [];
        let activeSubject = 'all';

        // Load wallet for nav
        async function loadWallet() {
            try {
                const w = await api('/api/wallet/me');
                document.getElementById('navBal').textContent = '₹' + (w.real || 0);
            } catch (e) { }
        }
        loadWallet();

        // Load books
        async function loadBooks() {
            try {
                allBooks = await api('/api/books');
                buildFilters();
                renderBooks(allBooks);
            } catch (e) {
                document.getElementById('booksGrid').innerHTML = `<div class="books-empty"><div class="ei">⚠️</div><p>${e.message}</p></div>`;
            }
        }

        function buildFilters() {
            const subjects = [...new Set(allBooks.map(b => b.subject))];
            const bar = document.getElementById('filterBar');
            bar.innerHTML = `<button class="filter-btn active" data-subject="all" onclick="setFilter('all',this)">All Books</button>`;
            subjects.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-subject', s);
                btn.textContent = s;
                btn.onclick = () => setFilter(s, btn);
                bar.appendChild(btn);
            });
        }

        function setFilter(subject, btn) {
            activeSubject = subject;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterBooks();
        }

        function filterBooks() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let filtered = activeSubject === 'all' ? allBooks : allBooks.filter(b => b.subject === activeSubject);
            if (q) filtered = filtered.filter(b => b.title.toLowerCase().includes(q) || b.subject.toLowerCase().includes(q));
            renderBooks(filtered);
        }

        function renderBooks(books) {
            const grid = document.getElementById('booksGrid');
            if (!books.length) {
                grid.innerHTML = `<div class="books-empty"><div class="ei">🔍</div><p>No books found.</p></div>`;
                return;
            }
            grid.innerHTML = books.map(b => {
                return `
          <div class="book-card" onclick="openBook(${b.id})">
            <div class="book-cover" style="background:linear-gradient(135deg,${b.cover_color || '#7c3aed'}22,${b.cover_color || '#7c3aed'}44);">
              <div class="book-cover-emoji">${b.cover_emoji || '📚'}</div>
              <div class="book-subject-tag">${b.subject}</div>
            </div>
            <div class="book-body">
              <div class="book-title">${b.title}</div>
              <div class="book-desc">${b.description || 'Premium question bank for competitive exam preparation.'}</div>
              <div class="book-stats">
                <div class="book-stat"><span>📝</span><span>${b.q_count || 0} Questions</span></div>
                <div class="book-stat"><span>⭐</span><span>${b.subject}</span></div>
              </div>
              <div class="book-price-row">
                <span class="price-free">FREE</span>
                <button class="book-btn unlocked" onclick="event.stopPropagation();openBook(${b.id})">Open Book →</button>
              </div>
            </div>
          </div>`;
            }).join('');
        }

        async function openBook(bookId) {
            const book = allBooks.find(b => b.id === bookId);
            if (!book) return;

            document.getElementById('modalContent').innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
          <div style="width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,${book.cover_color || '#7c3aed'}44,${book.cover_color || '#7c3aed'}22);border:1px solid rgba(255,255,255,0.08);display:inline-flex;align-items:center;justify-content:center;font-size:2.4rem;margin-bottom:14px;">${book.cover_emoji || '📚'}</div>
          <div style="font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold-lux);margin-bottom:6px;">${book.subject}</div>
          <div style="font-size:1.3rem;font-weight:900;color:#fff;">${book.title}</div>
          <div style="font-size:.8rem;color:rgba(255,255,255,0.35);margin-top:6px;">${book.description || ''}</div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;">
          <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;text-align:center;">
            <div style="font-size:.6rem;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:4px;">QUESTIONS</div>
            <div style="font-size:1.1rem;font-weight:900;color:#fff;">${book.q_count || 0}</div>
          </div>
          <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;text-align:center;">
            <div style="font-size:.6rem;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:4px;">SUBJECT</div>
            <div style="font-size:.85rem;font-weight:700;color:#fff;">${book.subject}</div>
          </div>
        </div>

        <div style="margin-bottom:14px;">
          <div style="font-size:.7rem;color:rgba(255,255,255,0.35);margin-bottom:10px;font-weight:600;letter-spacing:1px;">CHOOSE QUIZ MODE</div>
          <div class="quiz-mode-card selected" id="mode20" onclick="selectMode(20,this)">
            <div class="quiz-mode-label">⚡ Quick Fire — 20 Questions</div>
            <div class="quiz-mode-sub">15 minutes · Perfect for daily practice</div>
          </div>
          <div class="quiz-mode-card" id="mode50" onclick="selectMode(50,this)">
            <div class="quiz-mode-label">📋 Practice Set — 50 Questions</div>
            <div class="quiz-mode-sub">40 minutes · Thorough revision</div>
          </div>
          <div class="quiz-mode-card" id="modeAll" onclick="selectMode(0,this)">
            <div class="quiz-mode-label">🏆 Full Mock Test — All Questions</div>
            <div class="quiz-mode-sub">Complete exam simulation</div>
          </div>
        </div>
        <button onclick="startBookQuiz(${book.id})" style="width:100%;padding:14px;border-radius:14px;border:1px solid var(--gold-lux);background:rgba(201,168,76,0.1);color:var(--gold-lux);font-size:.95rem;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.5px;">
          ✦ Start Quiz
        </button>`;
            document.getElementById('bookModal').classList.add('open');
        }

        let quizMode = 20;
        function selectMode(n, el) {
            quizMode = n;
            document.querySelectorAll('.quiz-mode-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function startBookQuiz(bookId) {
            window.location.href = `/quiz.html?book_id=${bookId}&mode=${quizMode}`;
        }

        async function purchaseBook(bookId) {
            try {
                const res = await api(`/api/books/${bookId}/purchase`, 'POST');
                toast('✅ ' + res.message, 'success');
                closeModal();
                await loadBooks();
            } catch (e) {
                toast('❌ ' + e.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('bookModal').classList.remove('open');
        }

        function logout() { localStorage.clear(); window.location.href = '/login.html'; }

        loadBooks();
        renderFooter();
    </script>
</body>

</html>
